# 日志配置
log_level: ${LOG_LEVEL}  # 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL

# PDF 配置
pdf:
  path: ${PDF_PATH}  # PDF 目录路径
  file: ${PDF_FILE}  # PDF 文件全路径
  keywords: ["C.L1M1.M091"]  # 增加更多关键字测试
  poppler_path: ${POPPLER_PATH} 
  # 配置全图截图绝对坐标 (x1, y1, x2, y2)
  full_page_rect:
    x1: ${FULL_PAGE_RECT_X1}
    y1: ${FULL_PAGE_RECT_Y1}
    x2: ${FULL_PAGE_RECT_X2}
    y2: ${FULL_PAGE_RECT_Y2}
  # 关键词红色边框范围 (相对于中心偏移)
  full_page_keyword_border:
    x1: ${FULL_PAGE_BORDER_X1}
    y1: ${FULL_PAGE_BORDER_Y1}
    x2: ${FULL_PAGE_BORDER_X2}
    y2: ${FULL_PAGE_BORDER_Y2}
  full_page_border_width: ${FULL_PAGE_BORDER_WIDTH}
  full_page_dpi: ${DPI}

  # 区域截图范围 (基于关键字中心的偏移量)
  region_rect:
    x1: ${REGION_RECT_X1}
    y1: ${REGION_RECT_Y1}
    x2: ${REGION_RECT_X2}
    y2: ${REGION_RECT_Y2}
  # 区域截图中的关键字边框 (基于关键字中心偏移量)
  region_keyword_border:
    x1: ${REGION_BORDER_X1}
    y1: ${REGION_BORDER_Y1}
    x2: ${REGION_BORDER_X2}
    y2: ${REGION_BORDER_Y2}
  # 区域截图红框模式:
  # nearest_line_box: 以关键字中心向上下左右检索最近的水平 / 垂直矢量线并自动组成红框
  # fixed: 回退到 region_keyword_border 配置的固定偏移红框
  region_border_mode: nearest_line_box
  # 自动检索矢量边框时的线段筛选与搜索参数
  region_line_min_length: 20.0
  region_line_axis_tolerance: 0.5
  region_line_search_margin: 200.0
  region_border_width: ${REGION_BORDER_WIDTH}
  region_border_opacity: ${REGION_BORDER_OPACITY}
  region_dpi: ${REGION_DPI}

# 统计信息配置
output:
  directory: ${OUTPUT_DIR}  # 输出目录
  filename: ${OUTPUT_FILENAME}  # 输出文件名
